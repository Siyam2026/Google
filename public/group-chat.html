<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chat | Hacker Messenger</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <header class="sidebar-header">
                <button onclick="window.location.href='/home.html'">&lt; BACK</button>
                <div>Group Info</div>
            </header>
            <div class="sidebar-content" id="group-members">
                <!-- Members list -->
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <img id="group-avatar" src="/uploads/default-group.png" class="avatar" alt="Group">
                <div style="margin-left: 15px;">
                    <div id="group-name" style="font-weight: bold;">Group Name</div>
                    <div id="group-desc" style="font-size: 0.7rem; color: var(--text-secondary);">Encrypted Group Channel</div>
                </div>
            </header>

            <div id="messages" class="messages-container"></div>

            <form id="message-form" class="message-input-area">
                <input type="text" id="message-input" placeholder="Broadcast to group..." autocomplete="off">
                <button type="submit">SEND</button>
            </form>
        </main>
    </div>
    <script type="module" src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="/js/group.js"></script>
</body>
</html>
