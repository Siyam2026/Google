<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Messenger</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <img id="my-avatar" src="/uploads/default-avatar.png" class="avatar" alt="Me">
                    <span id="my-name">Operative</span>
                </div>
                <button id="logout-btn" title="Logout">X</button>
            </header>
            
            <div class="search-bar" style="padding: 10px;">
                <input type="text" id="user-search" placeholder="Search operatives...">
            </div>
            
            <div id="search-results" class="sidebar-content" style="display: none; border-bottom: 2px solid var(--accent-color);">
                <!-- Search results here -->
            </div>

            <div class="sidebar-content">
                <div style="padding: 10px; font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase;">Active Connections</div>
                <div id="friends-list">
                    <!-- Friends here -->
                </div>
                
                <div style="padding: 10px; font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; margin-top: 20px;">Incoming Requests</div>
                <div id="requests-list">
                    <!-- Requests here -->
                </div>
            </div>
        </aside>

        <main class="chat-area">
            <div id="no-chat-selected" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5;">
                <h2 style="margin-bottom: 10px;">SECURE CHANNEL INACTIVE</h2>
                <p>Select an operative to begin encrypted transmission.</p>
            </div>

            <div id="chat-window" style="display: none; flex: 1; flex-direction: column;">
                <header class="chat-header">
                    <img id="chat-avatar" src="/uploads/default-avatar.png" class="avatar" alt="User">
                    <div style="margin-left: 15px;">
                        <div id="chat-name" style="font-weight: bold;">Operative Name</div>
                        <div id="chat-status" style="font-size: 0.7rem; color: var(--text-secondary);">offline</div>
                    </div>
                    <div style="margin-left: auto; display: flex; gap: 10px;">
                        <button id="audio-call-btn">CALL</button>
                    </div>
                </header>

                <div id="messages" class="messages-container">
                    <!-- Messages here -->
                </div>

                <div id="typing-indicator" style="padding: 0 20px 5px; font-size: 0.7rem; color: var(--text-secondary); height: 15px;"></div>

                <form id="message-form" class="message-input-area">
                    <input type="text" id="message-input" placeholder="Enter secure message..." autocomplete="off">
                    <button type="submit">SEND</button>
                </form>
            </div>
        </main>
    </div>

    <!-- Audio Call Modal -->
    <div id="call-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;">
        <h2 id="call-title">INCOMING CALL</h2>
        <img id="call-avatar" src="/uploads/default-avatar.png" class="avatar" style="width: 100px; height: 100px; margin: 20px 0;">
        <div id="call-controls" style="display: flex; gap: 20px;">
            <button id="accept-call" style="border-color: #00ff41;">ACCEPT</button>
            <button id="reject-call" style="border-color: #ff0000; color: #ff0000;">REJECT</button>
        </div>
        <div id="active-call-controls" style="display: none;">
            <button id="end-call" style="border-color: #ff0000; color: #ff0000;">END TRANSMISSION</button>
        </div>
    </div>

    <script type="module" src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
