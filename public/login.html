<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hacker Messenger</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Hacker Login</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <div id="error-message" class="error-message"></div>
                <button type="submit" style="width: 100%;">Initialize Session</button>
            </form>
            <p style="margin-top: 20px; text-align: center; font-size: 0.8rem;">
                New operative? <a href="/register.html">Register here</a>
            </p>
        </div>
    </div>
    <script type="module" src="/js/login.js"></script>
</body>
</html>
